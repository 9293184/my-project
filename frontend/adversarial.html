<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对抗式训练系统 - AI 安全平台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .adversarial-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .models-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .model-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .model-card.attacker {
            border-left: 4px solid #e74c3c;
        }

        .model-card.defender {
            border-left: 4px solid #3498db;
        }

        .model-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .model-icon {
            font-size: 32px;
            margin-right: 10px;
        }

        .model-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .battle-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .battle-log {
            max-height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
        }

        .battle-round {
            background: white;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #ddd;
        }

        .battle-round.success {
            border-left-color: #27ae60;
        }

        .battle-round.failed {
            border-left-color: #e74c3c;
        }

        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .round-content {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .chart-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: #3498db;
            transition: width 0.3s;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #27ae60;
            color: white;
        }

        .badge-danger {
            background: #e74c3c;
            color: white;
        }

        .badge-warning {
            background: #f39c12;
            color: white;
        }
    </style>
</head>
<body>
    <div class="adversarial-container">
        <h1>🔴 vs 🔵 对抗式训练系统</h1>
        <p>攻击模型与防御模型的智能对抗</p>

        <!-- 模型状态 -->
        <div class="models-section">
            <div class="model-card attacker">
                <div class="model-header">
                    <span class="model-icon">🔴</span>
                    <div>
                        <h2>攻击模型</h2>
                        <p>Red Team Attacker</p>
                    </div>
                </div>
                <div class="model-stats">
                    <div class="stat-item">
                        <div class="stat-label">成功率</div>
                        <div class="stat-value" id="attack-success-rate">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">总轮次</div>
                        <div class="stat-value" id="attack-rounds">0</div>
                    </div>
                </div>
            </div>

            <div class="model-card defender">
                <div class="model-header">
                    <span class="model-icon">🔵</span>
                    <div>
                        <h2>防御模型</h2>
                        <p>AI Security Guard</p>
                    </div>
                </div>
                <div class="model-stats">
                    <div class="stat-item">
                        <div class="stat-label">准确率</div>
                        <div class="stat-value" id="defense-accuracy">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">拦截数</div>
                        <div class="stat-value" id="defense-blocks">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="battle-section">
            <h3>训练控制</h3>
            <div class="controls">
                <button class="btn btn-primary" onclick="startTraining()">开始训练</button>
                <button class="btn btn-danger" onclick="stopTraining()">停止训练</button>
                <button class="btn btn-secondary" onclick="testRound()">测试单轮</button>
                <button class="btn btn-secondary" onclick="resetTraining()">重置</button>
            </div>

            <div>
                <label>训练轮数：</label>
                <input type="number" id="num-rounds" value="10" min="1" max="100" style="padding: 5px; margin-left: 10px;">
            </div>

            <div style="margin-top: 10px;">
                <span>当前状态：</span>
                <span id="training-status" class="badge badge-secondary">未开始</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- 对抗日志 -->
        <div class="battle-section">
            <h3>实时对抗</h3>
            <div class="battle-log" id="battle-log">
                <p style="text-align: center; color: #999;">等待开始训练...</p>
            </div>
        </div>

        <!-- 统计图表 -->
        <div class="chart-section">
            <h3>训练历史</h3>
            <div id="chart-container" style="min-height: 300px;">
                <p style="text-align: center; color: #999; padding: 50px;">暂无数据</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001/api';
        let statusInterval = null;

        // 开始训练
        async function startTraining() {
            const numRounds = document.getElementById('num-rounds').value;
            
            try {
                const response = await fetch(`${API_BASE}/adversarial/start-training`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        num_rounds: parseInt(numRounds),
                        attack_types: ['prompt_injection', 'jailbreak', 'information_extraction']
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('training-status').textContent = '训练中';
                    document.getElementById('training-status').className = 'badge badge-success';
                    
                    // 开始轮询状态
                    if (statusInterval) clearInterval(statusInterval);
                    statusInterval = setInterval(updateStatus, 1000);
                } else {
                    alert('启动失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            }
        }

        // 停止训练
        async function stopTraining() {
            try {
                const response = await fetch(`${API_BASE}/adversarial/stop`, {
                    method: 'POST'
                });

                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('training-status').textContent = '已停止';
                    document.getElementById('training-status').className = 'badge badge-danger';
                    
                    if (statusInterval) {
                        clearInterval(statusInterval);
                        statusInterval = null;
                    }
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            }
        }

        // 测试单轮
        async function testRound() {
            try {
                const response = await fetch(`${API_BASE}/adversarial/test-round`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        attack_type: 'prompt_injection'
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    addBattleRound(result.data);
                    updateStatus();
                }
            } catch (error) {
                alert('测试失败：' + error.message);
            }
        }

        // 重置训练
        async function resetTraining() {
            if (!confirm('确定要重置所有训练数据吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/adversarial/reset`, {
                    method: 'POST'
                });

                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('battle-log').innerHTML = '<p style="text-align: center; color: #999;">等待开始训练...</p>';
                    updateStatus();
                }
            } catch (error) {
                alert('重置失败：' + error.message);
            }
        }

        // 更新状态
        async function updateStatus() {
            try {
                const response = await fetch(`${API_BASE}/adversarial/status`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    
                    // 更新统计数据
                    document.getElementById('attack-success-rate').textContent = 
                        (data.attack_success_rate * 100).toFixed(1) + '%';
                    document.getElementById('attack-rounds').textContent = data.total_rounds;
                    document.getElementById('defense-accuracy').textContent = 
                        (data.defense_accuracy * 100).toFixed(1) + '%';
                    document.getElementById('defense-blocks').textContent = 
                        Math.round(data.total_rounds * data.defense_accuracy);
                    
                    // 更新最新一轮
                    if (data.latest_round) {
                        addBattleRound(data.latest_round);
                    }
                    
                    // 更新训练状态
                    if (!data.is_training && statusInterval) {
                        clearInterval(statusInterval);
                        statusInterval = null;
                        document.getElementById('training-status').textContent = '已完成';
                        document.getElementById('training-status').className = 'badge badge-warning';
                    }
                }
            } catch (error) {
                console.error('更新状态失败:', error);
            }
        }

        // 添加对抗日志
        function addBattleRound(round) {
            const log = document.getElementById('battle-log');
            
            // 清除初始提示
            if (log.querySelector('p')) {
                log.innerHTML = '';
            }
            
            const roundDiv = document.createElement('div');
            roundDiv.className = `battle-round ${round.attack_successful ? 'success' : 'failed'}`;
            
            const statusBadge = round.attack_successful ? 
                '<span class="badge badge-success">攻击成功</span>' :
                '<span class="badge badge-danger">攻击失败</span>';
            
            roundDiv.innerHTML = `
                <div class="round-header">
                    <span>第 ${round.round} 轮</span>
                    ${statusBadge}
                </div>
                <div class="round-content">
                    <strong>攻击样本：</strong>${round.attack.text.substring(0, 100)}...<br>
                    <strong>防御判断：</strong>${round.defense.is_attack ? '检测到攻击' : '未检测到'} 
                    (置信度: ${(round.defense.confidence * 100).toFixed(1)}%)
                </div>
            `;
            
            log.insertBefore(roundDiv, log.firstChild);
            
            // 限制显示数量
            while (log.children.length > 20) {
                log.removeChild(log.lastChild);
            }
        }

        // 页面加载时更新一次状态
        updateStatus();
    </script>
</body>
</html>
